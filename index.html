<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#f4fbf6" />
    <meta name="description" content="Trash2Treasure — Turn everyday waste into creative recycling ideas with AI and Augmented Reality. Scan any item and see it transformed in AR." />
    <meta name="keywords" content="recycling, AR, augmented reality, upcycling, waste management, eco, sustainability" />
    <meta property="og:title" content="Trash2Treasure — Scan. Discover. Create." />
    <meta property="og:description" content="Point your camera at waste items and instantly discover creative recycling ideas in augmented reality." />
    <meta property="og:type" content="website" />
    <meta name="referrer" content="no-referrer-when-downgrade" />
    <!-- Mobile Web App -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Trash2Treasure" />
    
    <!-- Favicon (Leaf SVG) -->
    <link rel="icon" type="image/png" href="/icon-cropped.png" />
    
    <!-- Google Fonts preconnect -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <title>Trash2Treasure</title>
    
    <style>
      /* Critical inline: prevent FOUC */
      html, body, #root {
        margin: 0; padding: 0;
        background: #f4fbf6;
        width: 100%; height: 100%;
        overflow: hidden;
      }
      /* Splash loader */
      #splash {
        position: fixed; inset: 0;
        background: #f4fbf6;
        display: flex; align-items: center; justify-content: center;
        z-index: 99999;
        transition: opacity 0.4s ease;
      }
      #splash.hidden { opacity: 0; pointer-events: none; }
      .splash-inner { 
        text-align: center;
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      .splash-logo {
        width: 280px;
        max-width: 80vw;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .splash-logo img {
        width: 100%;
        height: auto;
        display: block;
      }
      .splash-loading-bar {
        width: 160px; height: 4px;
        background: #d8f3dc;
        border-radius: 4px;
        margin-top: 32px;
        overflow: hidden;
        position: relative;
      }
      .splash-loading-fill {
        position: absolute; top: 0; left: 0; bottom: 0;
        width: 40%;
        background: #40916c;
        border-radius: 4px;
        animation: loadingIndeterminate 1.5s ease-in-out infinite;
      }
      
      @keyframes loadingIndeterminate {
        0% { left: -40%; width: 40%; }
        50% { left: 20%; width: 60%; }
        100% { left: 100%; width: 40%; }
      }
    </style>
  </head>
  <body>
    <!-- Splash screen shown while React loads -->
    <div id="splash">
      <div class="splash-inner">
        <div class="splash-logo">
          <img src="/logo.png" alt="Trash2Treasure Logo" />
        </div>
        <div class="splash-loading-bar">
          <div class="splash-loading-fill"></div>
        </div>
      </div>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      // Hide splash once React mounts
      window.addEventListener('load', () => {
        setTimeout(() => {
          const splash = document.getElementById('splash');
          if (splash) {
            splash.classList.add('hidden');
            setTimeout(() => splash.remove(), 400);
          }
        }, 800); // artificially slightly delayed so the user can admire the new animation
      });
    </script>
  </body>
</html>
